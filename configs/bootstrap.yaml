lynx:
  application:
    name: user-service
    version: v1.0.0
    close_banner: false
  # Polaris-backed environments still rely on the same cmd/user explicit bootstrap
  # path; the difference is only where runtime config is sourced from.
  polaris:
    config_path: "configs/polaris.yaml"
    namespace: demo
    # Inject the real token from a secret manager or environment-specific config.
    token: REPLACE_WITH_POLARIS_TOKEN
    weight: 100
    ttl: 10
    timeout: 5s
