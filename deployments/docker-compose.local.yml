version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: lynx-layout-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lynx_test
      MYSQL_USER: lynx
      MYSQL_PASSWORD: ${LYNX_LAYOUT_MYSQL_PASSWORD:-lynx-local-password}
      MYSQL_ROOT_PASSWORD: ${LYNX_LAYOUT_MYSQL_ROOT_PASSWORD:-lynx-local-root-password}
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: lynx-layout-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
